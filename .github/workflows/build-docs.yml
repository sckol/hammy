name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'hammy_docs/**'
      - '.github/workflows/build-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Convert Obsidian Vault to HTML
      run: |
        mkdir -p /tmp/hammy-docs /tmp/hammy-docs-html
        cp -r hammy_docs/. /tmp/hammy-docs/
        docker run --rm \
          -v "/tmp/hammy-docs:/root/vault" \
          -v "/tmp/hammy-docs-html:/root/vault_html" \
          -e SITE_NAME="hammy — Random Walk Experiments" \
          sckol/obsidian-exporter:0.3.0

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: /tmp/hammy-docs-html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
