name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'hammy_docs/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Convert Obsidian Vault to HTML
      run: |
        mkdir -p /tmp/hammy-docs /tmp/hammy-docs-html
        cp -r hammy_docs/. /tmp/hammy-docs/
        docker run --rm \
          -v "/tmp/hammy-docs:/root/vault" \
          -v "/tmp/hammy-docs-html:/root/vault_html" \
          -e SITE_NAME="hammy — Random Walk Experiments" \
          sckol/obsidian-exporter:0.3.0

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: /tmp/hammy-docs-html
        publish_branch: gh-pages
